<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리집 가계부</title>
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="가계부">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;background:#f5f7fb;color:#1f2937}
    .tap{-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}

    /* 잠금화면 */
    .lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:#f5f7fb}
    .lock-logo{width:80px;height:80px;border-radius:20px;background:#f59e0b;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
    .lock-title{font-size:22px;font-weight:700;color:#1f2937;margin-bottom:6px}
    .lock-sub{font-size:14px;color:#6b7280;margin-bottom:32px;text-align:center}
    .lock-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px;margin-bottom:24px}
    .btn-new{padding:14px;border:none;border-radius:12px;background:#6366f1;color:white;font-size:15px;font-weight:600;cursor:pointer}
    .btn-cont{padding:14px;border:2px solid #6366f1;border-radius:12px;background:white;color:#6366f1;font-size:15px;font-weight:600;cursor:pointer}
    .pin-area{width:100%;max-width:300px}
    .pin-label{font-size:13px;color:#6b7280;margin-bottom:14px;text-align:center}
    .pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:24px}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #d1d5db;background:transparent;transition:background 0.15s}
    .pin-dot.on{background:#6366f1;border-color:#6366f1}
    .pin-pad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .pin-key{padding:16px;border:1px solid #e5e7eb;border-radius:12px;background:white;font-size:20px;font-weight:600;cursor:pointer;text-align:center;color:#1f2937}
    .pin-key:active{background:#f3f4f6}
    .pin-err{color:#ef4444;font-size:13px;text-align:center;margin-top:10px;min-height:20px}
    .setup-area{width:100%;max-width:320px}
    .s-label{font-size:12px;color:#6b7280;margin-bottom:4px;display:block}
    .s-input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:12px}
    .member-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;min-height:32px}
    .m-tag{display:flex;align-items:center;gap:4px;background:#eff6ff;border:1px solid #6366f1;color:#3730a3;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:500}
    .m-rm{cursor:pointer;font-size:14px;line-height:1}
    .m-add{display:flex;gap:6px;margin-bottom:14px}
    .m-add input{flex:1;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px}
    .m-add button{padding:8px 14px;background:#6366f1;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
    .btn-create{width:100%;padding:14px;background:#6366f1;color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
    .btn-back{width:100%;padding:10px;border:none;background:none;color:#9ca3af;font-size:13px;cursor:pointer;margin-top:6px}

    /* 메인앱 */
    .app{max-width:520px;margin:0 auto;min-height:100vh}
    .tab-bar{display:flex;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:10}
    .tab-btn{flex:1;padding:13px 4px;text-align:center;font-size:12px;font-weight:500;color:#9ca3af;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent}
    .tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}
    .tab-content{display:none;padding:14px}
    .tab-content.active{display:block}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px}
    h2{font-size:15px;font-weight:600;margin-bottom:12px;color:#1f2937}
    .who-toggle{display:grid;gap:6px;margin-bottom:12px}
    .who-btn{padding:8px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:#6b7280;text-align:center}
    .who-btn.am{background:#eff6ff;border-color:#6366f1;color:#3730a3}
    .who-btn.aw{background:#fdf2f8;border-color:#ec4899;color:#9d174d}
    .who-btn.ac{background:#f0fdf4;border-color:#10b981;color:#065f46}
    .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
    .type-btn{padding:10px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-size:14px;font-weight:500;cursor:pointer;color:#6b7280}
    .type-btn.income.active{background:#ecfdf5;border-color:#10b981;color:#065f46}
    .type-btn.expense.active{background:#fef2f2;border-color:#ef4444;color:#991b1b}
    .form-row{margin-bottom:10px}
    .form-row label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px}
    .form-row input,.form-row select{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;background:#fff}
    .submit-btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;color:#fff}
    .submit-btn.income{background:#10b981}
    .submit-btn.expense{background:#ef4444}
    .sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
    .sum-sec{background:#f9fafb;border-radius:8px;padding:10px}
    .sum-sec .wl{font-size:11px;font-weight:600;margin-bottom:6px}
    .sum-sec .row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
    .sum-sec .val{font-weight:600}
    .sum-sec .bal{display:flex;justify-content:space-between;font-size:12px;font-weight:700;border-top:1px solid #e5e7eb;padding-top:5px;margin-top:4px}
    .filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .pill{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid #d1d5db;background:white;color:#6b7280;cursor:pointer;font-weight:500}
    .pill.active{background:#6366f1;border-color:#6366f1;color:white}
    .pill-uncat{padding:4px 12px;font-size:12px;border-radius:20px;border:2px solid #f59e0b;background:white;color:#92400e;cursor:pointer;font-weight:600}
    .pill-uncat.active{background:#f59e0b;color:white}
    .tx-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f3f4f6}
    .tx-item:last-child{border-bottom:none}
    .tx-l{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
    .tx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .tx-desc{font-size:13px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
    .tx-meta{font-size:11px;color:#9ca3af;margin-top:2px}
    .tx-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .tx-amt{font-size:13px;font-weight:600;white-space:nowrap}
    .del-btn{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:18px;padding:2px 4px}
    .wtag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;white-space:nowrap}
    .ctag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:500;background:#f3f4f6;color:#6b7280;white-space:nowrap}
    .empty{text-align:center;color:#9ca3af;padding:30px;font-size:14px}
    .upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px}
    .upload-zone:hover{border-color:#6366f1}
    .upload-zone input{display:none}
    .upload-btn-lbl{display:inline-block;background:#6366f1;color:white;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:5px}
    .upload-hint{font-size:11px;color:#9ca3af}
    .ufiles{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .ufile{display:flex;justify-content:space-between;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:12px}
    .fname{font-weight:500;color:#1f2937}
    .fmeta{color:#9ca3af;font-size:11px}
    .frm{background:none;border:none;color:#9ca3af;cursor:pointer;font-size:16px}
    .analyze-btn{width:100%;padding:11px;border:none;border-radius:8px;background:#6366f1;color:white;font-size:14px;font-weight:600;cursor:pointer}
    .analyze-btn:disabled{background:#c7d2fe;cursor:not-allowed}
    .err-msg{color:#ef4444;font-size:12px;margin-top:6px}
    .pbadge{display:inline-block;background:#eff6ff;color:#3730a3;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;border:2px solid #6366f1}
    .pbadge.off{background:#f3f4f6;color:#9ca3af;border-color:#d1d5db;text-decoration:line-through}
    .sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .si{background:#f9fafb;border-radius:8px;padding:12px}
    .sl{font-size:11px;color:#9ca3af;margin-bottom:4px}
    .sv{font-size:16px;font-weight:700}
    .legend{display:flex;flex-wrap:wrap;gap:5px 12px;margin-bottom:10px}
    .li{display:flex;align-items:center;gap:4px;font-size:11px;color:#6b7280}
    .ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
    .cbars{display:flex;flex-direction:column;gap:8px}
    .cbrow{display:flex;align-items:center;gap:8px}
    .cblbl{font-size:12px;color:#374151;min-width:90px}
    .cbbg{flex:1;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden}
    .cbfill{height:100%;border-radius:3px}
    .cbamt{font-size:11px;color:#6b7280;min-width:65px;text-align:right;white-space:nowrap}
    table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
    th{text-align:left;background:#f9fafb;border-bottom:1px solid #e5e7eb;padding:8px 6px;color:#6b7280;font-size:11px;font-weight:600}
    td{border-bottom:1px solid #f3f4f6;padding:8px 6px;vertical-align:middle}
    th:nth-child(1),td:nth-child(1){width:70px}
    th:nth-child(3),td:nth-child(3){width:72px}
    th:nth-child(4),td:nth-child(4){width:64px;text-align:right}
    td:nth-child(2){overflow-wrap:break-word;word-break:keep-all}
    .badge{display:inline-block;padding:2px 5px;border-radius:6px;font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer}
    .ubadge{display:inline-block;padding:2px 6px;border-radius:6px;font-size:10px;font-weight:700;background:#fef3c7;color:#92400e;cursor:pointer;white-space:nowrap}
    .amt-cell{text-align:right;font-weight:600;white-space:nowrap}
    .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
    .modal-ov.open{display:flex}
    .modal-box{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;max-height:60vh;overflow-y:auto}
    .modal-ttl{font-size:14px;font-weight:600;margin-bottom:6px}
    .modal-store{font-size:12px;color:#6b7280;margin-bottom:12px}
    .cat-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .cat-opt{padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;cursor:pointer;text-align:center;background:#fff}
    .cat-opt:active{background:#f5f3ff;border-color:#6366f1;color:#4338ca}
    .chart-wrap{position:relative;width:100%;height:220px;margin-bottom:16px}
    .no-data{text-align:center;color:#9ca3af;padding:40px;font-size:14px}
    .wst{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
  </style>
</head>
<body>

<!-- 잠금화면 -->
<div id="lockScreen" class="lock">
  <div class="lock-logo">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="24,5 5,21 10,21 10,43 38,43 38,21 43,21" fill="white"/>
      <rect x="14" y="21" width="20" height="22" fill="#f59e0b"/>
      <text x="24" y="39" text-anchor="middle" font-size="17" font-weight="700" fill="white" font-family="sans-serif">&#8361;</text>
    </svg>
  </div>
  <div class="lock-title" id="lockTitle">우리집 가계부</div>
  <div class="lock-sub" id="lockSub">가족과 함께 쓰는 스마트 가계부</div>

  <!-- 메인 버튼 -->
  <div id="mainBtns" class="lock-btns">
    <button class="btn-new tap" onclick="showSetup()">새로 만들기</button>
    <button class="btn-cont tap" onclick="showPinInput()">이어서 관리</button>
  </div>

  <!-- PIN 입력 -->
  <div id="pinArea" class="pin-area" style="display:none">
    <div class="pin-label">비밀번호를 입력해주세요</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key tap" onclick="pinKey('1')">1</button>
      <button class="pin-key tap" onclick="pinKey('2')">2</button>
      <button class="pin-key tap" onclick="pinKey('3')">3</button>
      <button class="pin-key tap" onclick="pinKey('4')">4</button>
      <button class="pin-key tap" onclick="pinKey('5')">5</button>
      <button class="pin-key tap" onclick="pinKey('6')">6</button>
      <button class="pin-key tap" onclick="pinKey('7')">7</button>
      <button class="pin-key tap" onclick="pinKey('8')">8</button>
      <button class="pin-key tap" onclick="pinKey('9')">9</button>
      <button class="pin-key tap" onclick="pinKey('back')" style="color:#6b7280;font-size:16px">&#8592;</button>
      <button class="pin-key tap" onclick="pinKey('0')">0</button>
      <button class="pin-key tap" onclick="showMainBtns()" style="font-size:12px;color:#6b7280">취소</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>

  <!-- 새로 만들기 설정 -->
  <div id="setupArea" class="setup-area" style="display:none">
    <span class="s-label">가계부 이름</span>
    <input class="s-input" id="setupName" placeholder="예) 우리집 가계부" value="우리집 가계부">
    <span class="s-label">비밀번호 4자리</span>
    <div class="pin-dots" id="setupDots" style="justify-content:flex-start;margin-bottom:10px">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-pad" style="margin-bottom:16px">
      <button class="pin-key tap" onclick="setupKey('1')">1</button>
      <button class="pin-key tap" onclick="setupKey('2')">2</button>
      <button class="pin-key tap" onclick="setupKey('3')">3</button>
      <button class="pin-key tap" onclick="setupKey('4')">4</button>
      <button class="pin-key tap" onclick="setupKey('5')">5</button>
      <button class="pin-key tap" onclick="setupKey('6')">6</button>
      <button class="pin-key tap" onclick="setupKey('7')">7</button>
      <button class="pin-key tap" onclick="setupKey('8')">8</button>
      <button class="pin-key tap" onclick="setupKey('9')">9</button>
      <button class="pin-key tap" onclick="setupKey('back')" style="color:#6b7280;font-size:16px">&#8592;</button>
      <button class="pin-key tap" onclick="setupKey('0')">0</button>
      <div></div>
    </div>
    <span class="s-label">멤버 추가</span>
    <div class="member-row" id="memberRow"></div>
    <div class="m-add">
      <input id="memberInput" placeholder="이름 입력 (예: jake)" maxlength="10" onkeydown="if(event.key==='Enter')addMember()">
      <button class="tap" onclick="addMember()">추가</button>
    </div>
    <div class="pin-err" id="setupErr"></div>
    <button class="btn-create tap" onclick="createApp()">생성하기</button>
    <button class="btn-back tap" onclick="showMainBtns()">← 뒤로</button>
  </div>
</div>

<!-- 메인 앱 -->
<div id="mainApp" style="display:none">
<div class="app">
  <div class="tab-bar">
    <button class="tab-btn active tap" onclick="switchTab(0)">기록</button>
    <button class="tab-btn tap" onclick="switchTab(1)">명세서</button>
    <button class="tab-btn tap" onclick="switchTab(2)">월별통계</button>
  </div>

  <!-- 탭1 -->
  <div class="tab-content active" id="tab0">
    <div class="card">
      <div class="who-toggle" id="whoToggle0"></div>
      <div class="type-toggle">
        <button class="type-btn income active tap" id="btnIncome" onclick="setType('income')">+ 수입</button>
        <button class="type-btn expense tap" id="btnExpense" onclick="setType('expense')">- 지출</button>
      </div>
      <div class="form-row"><label>금액 (원)</label><input type="number" id="inAmt" placeholder="50000"></div>
      <div class="form-row"><label>적요</label><input type="text" id="inDesc" placeholder="예) 점심식사, 월급"></div>
      <div class="form-row"><label>카테고리</label>
        <select id="inCat">
          <option value="">카테고리 선택</option>
          <option>식비/외식</option><option>카페/베이커리</option><option>교통</option>
          <option>쇼핑</option><option>대형마트</option><option>편의점</option>
          <option>의료/건강</option><option>문화/여가</option><option>여행</option>
          <option>미용</option><option>생활</option><option>수입</option><option>기타</option>
        </select>
      </div>
      <div class="form-row"><label>날짜</label><input type="date" id="inDate"></div>
      <button class="submit-btn income tap" id="submitBtn" onclick="addTx()">추가하기</button>
    </div>
    <div class="card">
      <h2>요약</h2>
      <div class="sum-grid" id="sumGrid"></div>
    </div>
    <div class="card">
      <div class="filter-row" id="whoFilter0"></div>
      <div id="txList"><div class="empty">아직 내역이 없어요</div></div>
    </div>
  </div>

  <!-- 탭2 -->
  <div class="tab-content" id="tab1">
    <div class="card">
      <h2>명세서 업로드</h2>
      <div class="who-toggle" id="whoToggle1"></div>
      <label class="upload-zone">
        <input type="file" id="fileInput" accept=".xls,.xlsx,.html" multiple>
        <div class="upload-btn-lbl">파일 선택 (복수 가능)</div>
        <div class="upload-hint">현대카드·우리카드 xls · 여러 파일 동시 선택 가능</div>
      </label>
      <div class="ufiles" id="ufiles"></div>
      <button class="analyze-btn tap" id="analyzeBtn" onclick="analyzeAll()" disabled>분석하기</button>
      <div class="err-msg" id="errMsg"></div>
    </div>
    <div id="analysisResult" style="display:none">
      <div class="card">
        <h2>요약</h2>
        <p style="font-size:11px;color:#9ca3af;margin-bottom:8px">기간 뱃지를 눌러 필터할 수 있어요</p>
        <div id="periodBadges" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>
        <div class="sg" id="statsGrid"></div>
      </div>
      <div class="card">
        <h2>카테고리별 지출</h2>
        <div class="legend" id="chartLegend"></div>
        <div style="position:relative;height:200px;margin-bottom:14px"><canvas id="donut"></canvas></div>
        <div class="cbars" id="catBars"></div>
      </div>
      <div class="card">
        <h2>전체 내역</h2>
        <div class="filter-row" id="filterBtns"></div>
        <div style="overflow-x:auto">
          <table><thead><tr><th>날짜</th><th>가맹점</th><th>카테고리</th><th class="amt-cell">금액</th></tr></thead>
          <tbody id="txBody"></tbody></table>
        </div>
      </div>
    </div>
  </div>

  <!-- 탭3 -->
  <div class="tab-content" id="tab2">
    <div class="card">
      <h2>월별 지출 추이</h2>
      <div class="wst" id="whoToggle2"></div>
      <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>

function classify(name) {
  var n = (name||'').toLowerCase();
  for (var cat in RULES) {
    var kws = RULES[cat];

      if (n.indexOf(kws[i].toLowerCase()) >= 0) return { cat:cat, certain:true };
    }
  }
  return { cat:'기타', certain:false };
}

function parseHyundai(text) {
  var fixed = text.replace(/<\/t([dh])\s+>/gi, '<\/t$1>');
  var pm = text.match(/(\d{4})년\s*(\d{2})월\s*이용대금명세서/);
  var period = pm ? pm[1]+'-'+pm[2] : null;
  var rowMs = [...fixed.matchAll(/<tr>([\s\S]*?)<\/tr>/gi)];
  var allRows = rowMs.map(function(m) {
    var cells = [...m[1].matchAll(/<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/gi)];
    return cells.map(function(c){ return c[1].replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim(); });
  }).filter(function(r){ return r.length>0; });
  var hIdx = allRows.findIndex(function(r){ return r.indexOf('이용일')>=0 && r.indexOf('이용가맹점')>=0; });
  if (hIdx<0) return null;
  var h = allRows[hIdx];
  var iD=h.indexOf('이용일'), iS=h.indexOf('이용가맹점'), iA=h.indexOf('이용금액');
  var txs = allRows.slice(hIdx+1).map(function(row) {
    var store = row[iS]||'';
    var custom = customCats[store];
    var res = custom ? {cat:custom,certain:true} : classify(store);
    return { date:row[iD]||'', store, amount:parseInt((row[iA]||'0').replace(/[^0-9]/g,''))||0, category:res.cat, certain:res.certain };
  }).filter(function(t){ return t.store && t.amount>0; });
  return { txs, period };
}

function parseWoori(buf) {
  try {
    var wb = XLSX.read(buf, {type:'array'});
    var ws = wb.Sheets[wb.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    var hIdx = rows.findIndex(function(r){ return r.some(function(c){ return String(c).indexOf('가맹점')>=0; }); });
    if (hIdx<0) return null;
    var h = rows[hIdx].map(function(c){ return String(c).trim(); });
    var iS = h.findIndex(function(x){ return x.indexOf('가맹점')>=0; });
    var iA = h.findIndex(function(x){ return x.indexOf('승인금액')>=0||x.indexOf('이용금액')>=0; });
    var iD = h.findIndex(function(x){ return x.indexOf('접수일')>=0||x.indexOf('이용일')>=0||x.indexOf('거래일')>=0; });
    if (iS<0||iA<0) return null;
    var period = null;
    for (var i=0; i<hIdx; i++) {
      for (var j=0; j<rows[i].length; j++) {
        var m = String(rows[i][j]).match(/(\d{4})[\/\-](\d{2})/);
        if (m) { period = m[1]+'-'+m[2]; break; }
      }
      if (period) break;
    }
    var txs = rows.slice(hIdx+1).map(function(row) {
      var store = String(row[iS]||'').trim();
      var amt = parseInt(String(row[iA]||'0').replace(/[^0-9]/g,''))||0;
      var dr = iD>=0 ? String(row[iD]||'') : '';
      var dm = dr.match(/(\d{4})[\/\-](\d{2})[\/\-](\d{2})/);
      var date = dm ? dm[1]+'년 '+dm[2]+'월 '+dm[3]+'일' : dr;
      var custom = customCats[store];
      var res = custom ? {cat:custom,certain:true} : classify(store);
      return { date, store, amount:amt, category:res.cat, certain:res.certain };
    }).filter(function(t){ return t.store && t.amount>0 && t.store.indexOf('합계')<0; });
    return { txs, period };
  } catch(e) { return null; }
}

function renderFileList() {
  document.getElementById('ufiles').innerHTML = pendingFiles.map(function(p) {
    return '<div class="ufile"><div><div class="fname">'+p.name+'</div><div class="fmeta">'+(p.period?p.period+' · '+p.count+'건':'대기 중')+'</div></div><button class="frm tap" onclick="removeFile(\''+p.name+'\')">&#215;</button></div>';
  }).join('');
  document.getElementById('analyzeBtn').disabled = pendingFiles.length===0;
}

async function analyzeAll() {
  document.getElementById('errMsg').textContent='';
  var results=[];
  for (var i=0; i<pendingFiles.length; i++) {
    var pf = pendingFiles[i];
    try {
      var ab = await pf.file.arrayBuffer();
      var magic = new Uint8Array(ab.slice(0,4));
      var isXLS = magic[0]===0xD0 && magic[1]===0xCF;
      var parsed = null;
      if (isXLS) { parsed = parseWoori(new Uint8Array(ab)); }
      else { parsed = parseHyundai(await pf.file.text()); }
      if (!parsed||!parsed.txs.length) throw new Error(pf.name+': 내역을 찾지 못했어요');
      pf.period = parsed.period||'날짜불명'; pf.count = parsed.txs.length;
      parsed.txs.forEach(function(t){ results.push(Object.assign({},t,{who:curStatWho,period:pf.period,source:pf.name})); });
    } catch(e) { document.getElementById('errMsg').textContent=e.message; return; }
  }
  renderFileList();
  allStatTxs=results; statFilter='전체';
  var ps = [...new Set(results.map(function(t){ return t.period; }))].sort();
  activePeriods = new Set(ps);
  renderAnalysis();
  document.getElementById('analysisResult').style.display='';
}

function getActiveTxs() { return allStatTxs.filter(function(t){ return activePeriods.has(t.period); }); }

function renderPeriodBadges() {
  var ps = [...new Set(allStatTxs.map(function(t){ return t.period; }))].sort();
  document.getElementById('periodBadges').innerHTML = ps.map(function(p) {
    return '<span class="pbadge'+(activePeriods.has(p)?'':' off')+' tap" onclick="togglePeriod(\''+p+'\')">'+p+'</span>';
  }).join('');
}

function togglePeriod(p) {
  if (activePeriods.has(p)) activePeriods.delete(p); else activePeriods.add(p);
  renderAnalysis();
}

function renderAnalysis() {
  renderPeriodBadges();
  var txs = getActiveTxs();
  var total = txs.reduce(function(s,t){ return s+t.amount; },0);
  var ct = {};
  txs.forEach(function(t){ ct[t.category]=(ct[t.category]||0)+t.amount; });
  var sorted = Object.entries(ct).sort(function(a,b){ return b[1]-a[1]; });
  var cmap = {};
  sorted.forEach(function(x,i){ cmap[x[0]]=COLORS[i%COLORS.length]; });
  var unc = txs.filter(function(t){ return !t.certain; }).length;

  document.getElementById('statsGrid').innerHTML =
    '<div class="si"><div class="sl">총 지출</div><div class="sv">'+fmt(total)+'</div></div>'+
    '<div class="si"><div class="sl">거래 건수</div><div class="sv">'+txs.length+'건</div></div>'+
    '<div class="si"><div class="sl">최다 지출</div><div class="sv" style="font-size:13px">'+(sorted[0]?sorted[0][0]:'-')+'</div></div>'+
    '<div class="si"><div class="sl">미분류</div><div class="sv">'+unc+'건</div></div>';

  document.getElementById('chartLegend').innerHTML = sorted.map(function(x,i) {
    return '<span class="li"><span class="ld" style="background:'+COLORS[i%COLORS.length]+'"></span>'+x[0]+' '+(total?Math.round(x[1]/total*100):0)+'%</span>';
  }).join('');

  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donut'), {
    type:'doughnut',
    data:{ labels:sorted.map(function(x){ return x[0]; }), datasets:[{ data:sorted.map(function(x){ return x[1]; }), backgroundColor:COLORS.slice(0,sorted.length), borderWidth:2, borderColor:'#fff' }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:function(ctx){ return ' '+ctx.label+': '+fmt(ctx.raw); }}}}}
  });

  document.getElementById('catBars').innerHTML = sorted.map(function(x,i) {
    return '<div class="cbrow"><div class="cblbl">'+x[0]+'</div><div class="cbbg"><div class="cbfill" style="width:'+(total?Math.round(x[1]/total*100):0)+'%;background:'+COLORS[i%COLORS.length]+'"></div></div><div class="cbamt">'+fmt(x[1])+'</div></div>';
  }).join('');

  var btns = ['전체'].concat(sorted.map(function(x){ return x[0]; })).map(function(c) {
    return '<button class="pill'+(c===statFilter?' active':'')+' tap" onclick="setStatFilter(\''+c+'\',this)">'+c+'</button>';
  });
  if (unc>0) btns.push('<button class="pill-uncat'+( statFilter==='__unc__'?' active':'')+' tap" onclick="setStatFilter(\'__unc__\',this)">미분류 '+unc+'건</button>');
  document.getElementById('filterBtns').innerHTML = btns.join('');

  renderStatTable(cmap, txs);
}

function setStatFilter(cat, btn) {
  statFilter = cat;
  document.querySelectorAll('#filterBtns .pill, #filterBtns .pill-uncat').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var txs = getActiveTxs();
  var ct={};
  txs.forEach(function(t){ ct[t.category]=(ct[t.category]||0)+t.amount; });
  var sorted=Object.entries(ct).sort(function(a,b){ return b[1]-a[1]; });
  var cmap={};
  sorted.forEach(function(x,i){ cmap[x[0]]=COLORS[i%COLORS.length]; });
  renderStatTable(cmap, txs);
}

function renderStatTable(cmap, srcTxs) {
  var txs = srcTxs||getActiveTxs();
  var filtered = statFilter==='전체' ? txs : statFilter==='__unc__' ? txs.filter(function(t){ return !t.certain; }) : txs.filter(function(t){ return t.category===statFilter; });
  document.getElementById('txBody').innerHTML = !filtered.length
    ? '<tr><td colspan="4" class="empty">내역 없음</td></tr>'
    : filtered.map(function(t,idx) {
        var color = cmap[t.category]||'#6b7280';
        var se = t.store.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        var catCell = '<span class="'+(t.certain?'badge ubadge'.split(' ')[0]:'ubadge')+'" style="'+(t.certain?'background:'+color+'22;color:'+color+';':'')+'" onclick="openModal('+idx+',\''+se+'\')">'+t.category+'</span>';
        return '<tr><td style="color:#9ca3af">'+fmtDate(t.date)+'</td><td>'+t.store+'</td><td>'+catCell+'</td><td class="amt-cell">'+fmt(t.amount)+'</td></tr>';
      }).join('');
}

var modalIdx=null;
function openModal(idx, store) {
  modalIdx=idx;
  document.getElementById('modalStore').textContent=store;
  document.getElementById('catOpts').innerHTML=ALL_CATS.map(function(c) {
    var se=c.replace(/'/g,"\\'");
    var stse=store.replace(/'/g,"\\'");
    return '<button class="cat-opt tap" onclick="selectCat(\''+se+'\',\''+stse+'\')">'+c+'</button>';
  }).join('');
  document.getElementById('catModal').classList.add('open');
}
function closeModal(e) { if(e.target===document.getElementById('catModal')) document.getElementById('catModal').classList.remove('open'); }
function selectCat(cat,store) {
  customCats[store]=cat;
  allStatTxs.forEach(function(t){ if(t.store===store){ t.category=cat; t.certain=true; } });
  document.getElementById('catModal').classList.remove('open');
  renderAnalysis();
}

// ===== 월별 통계 =====
function setStatWhoFilter(who,btn) {
  statWhoFilter=who;
  btn.closest('.wst').querySelectorAll('.who-btn').forEach(function(b){ b.className='who-btn tap'; });
  btn.className='who-btn am tap';
  renderMonthly();
}

function renderMonthly() {
  var txs = statWhoFilter==='all' ? allStatTxs : allStatTxs.filter(function(t){ return t.who===statWhoFilter; });
  if (!txs.length) { document.getElementById('monthlyNoData').style.display=''; return; }
  document.getElementById('monthlyNoData').style.display='none';
  var mt={};
  txs.forEach(function(t){ mt[t.period]=(mt[t.period]||0)+t.amount; });
  var months=Object.keys(mt).sort();
  if (monthlyChartInst) monthlyChartInst.destroy();
  monthlyChartInst=new Chart(document.getElementById('monthlyChart'),{
    type:'bar',
    data:{labels:months,datasets:[{label:'지출',data:months.map(function(m){ return mt[m]; }),backgroundColor:'#6366f1',borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){ return ' '+fmt(ctx.raw); }}}},scales:{y:{ticks:{callback:function(v){ return Math.round(v/10000)+'만'; }}},x:{ticks:{autoSkip:false}}}}
  });
  var acs=[...new Set(txs.map(function(t){ return t.category; }))].sort();
  if (!selCats.size) acs.slice(0,4).forEach(function(c){ selCats.add(c); });
  document.getElementById('catFilterBtns').innerHTML=acs.map(function(c) {
    return '<button class="pill'+(selCats.has(c)?' active':'')+' tap" onclick="toggleCat(\''+c+'\',this)">'+c+'</button>';
  }).join('');
  renderCatTrend(txs,months,acs);
}

function toggleCat(cat,btn) {
  selCats.has(cat)?selCats.delete(cat):selCats.add(cat);
  btn.classList.toggle('active');
  var txs=statWhoFilter==='all'?allStatTxs:allStatTxs.filter(function(t){ return t.who===statWhoFilter; });
  var months=[...new Set(txs.map(function(t){ return t.period; }))].sort();
  var acs=[...new Set(txs.map(function(t){ return t.category; }))].sort();
  renderCatTrend(txs,months,acs);
}

function renderCatTrend(txs,months,acs) {
  var ds=acs.filter(function(c){ return selCats.has(c); }).map(function(cat) {
    var ci=acs.indexOf(cat);
    return {
      label:cat,
      data:months.map(function(m){ return txs.filter(function(t){ return t.period===m&&t.category===cat; }).reduce(function(s,t){ return s+t.amount; },0); }),
      borderColor:COLORS[ci%COLORS.length],
      backgroundColor:COLORS[ci%COLORS.length]+'33',
      tension:0.3,fill:false,pointRadius:4
    };
  });
  if (catTrendInst) catTrendInst.destroy();
  catTrendInst=new Chart(document.getElementById('catTrendChart'),{
    type:'line',
    data:{labels:months,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,plugins:{tooltip:{callbacks:{label:function(ctx){ return ' '+ctx.dataset.label+': '+fmt(ctx.raw); }}}},scales:{y:{ticks:{callback:function(v){ return Math.round(v/10000)+'만'; }}}}}
  });
}
